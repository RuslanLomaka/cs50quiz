{% extends "quizforger/base.html" %}
{% load static %}

{% block title %}Quiz | QuizForger{% endblock %}

{% block head %}
  <script>
    window.QUIZ_ID = "{{ quiz.id }}";
  </script>
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-9 col-xl-8">

      <div class="mb-3">
        <h1 id="title" class="h2 mb-0">Loading...</h1>
      </div>

      <div id="quiz" class="vstack gap-3"></div>

      <div class="d-flex align-items-center gap-3 mt-4">
        <button id="check" class="btn btn-primary">Check answers</button>
        <div id="result" class="fw-semibold"></div>
        <div id="attemptStatus" class="small text-muted"></div>
      </div>

    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script defer src="{% static 'quizforger/quiz.js' %}"></script>
{% endblock %}
